services:
  # 后端服务 (FastAPI)
  backend:
    build: ./backend
    container_name: cement_backend
    ports:
      - "${BACKEND_PORT:-42500}:42500"
    volumes:
      - ./backend/data:/app/data              # 挂载配置与日志目录
    restart: always
    networks:
      - cement_network

  # 前端服务 (Vue + Nginx)
  frontend:
    build: ./frontend
    container_name: cement_frontend
    ports:
      - "${FRONTEND_PORT:-32500}:32500"
    depends_on:
      - backend
    restart: always
    networks:
      - cement_network

networks:
  cement_network:
    driver: bridge
